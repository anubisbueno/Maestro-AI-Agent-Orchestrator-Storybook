language: pt-BR

reviews:
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  path_instructions:
    - path: "src/shared/components/**/*.tsx"
      instructions: |
        Design System & Atomic Design:
        - Atomic Design hierarchy: atoms (no logic), molecules (2-3 atoms), organisms (state)
        - Design tokens from globals.css (--color-*, --spacing-*) — never hardcode colors/sizes
        - Single responsibility: one component per file
        - TypeScript strict: no `any`, no `@ts-ignore`, no `as` casts
        - Component MUST have corresponding *.test.tsx in __tests__/ (tested before consumed by frontend)
        - Component MUST have corresponding *.stories.tsx (visual documentation)
        - Accessibility checklist:
          - Contrast ratio AA (4.5:1 text, 3:1 components)
          - focus-visible with ring-2 outline
          - Touch targets minimum 24x24px
          - aria-labels on interactive elements
          - Status = color + icon + text (never color alone)

    - path: "src/components/ui/**"
      instructions: |
        shadcn/ui Base Components:
        - Generated by shadcn CLI — minimal modifications
        - Brand tokens applied via CSS variables, not inline styles
        - Do NOT add tests for generated ui/ components (coverage excluded)
        - Wrappers in src/shared/components/ re-export with brand customizations

    - path: "src/**/*.ts"
      instructions: |
        TypeScript & Clean Code:
        - Strict mode: no `any`, no `@ts-ignore`, no `as` casts
        - Pure functions where possible, no hidden side effects
        - Functions <20 lines, early return, no deep nesting
        - No magic numbers (use named constants)
        - camelCase vars/functions, PascalCase types, UPPER_SNAKE_CASE constants, kebab-case files
        - Code and comments in English

    - path: "**/__tests__/**"
      instructions: |
        Component Testing:
        - Vitest + happy-dom (no real browser)
        - AAA pattern: Arrange → Act → Assert
        - Tests must be isolated (no interdependencies)
        - Meaningful names: "should {expected behavior} when {condition}"
        - No `any` in mocks
        - Coverage targets: 90%+ (statements, branches, functions, lines)
        - Test props, states, interactions, edge cases
        - Use getByRole for accessibility-first testing
        - Component must be tested BEFORE being consumed by frontend

    - path: "**/*.stories.tsx"
      instructions: |
        Storybook Stories:
        - Every component must have a story
        - Cover all variants: default, hover, focus, disabled, error, loading
        - Use args for interactive controls
        - Document accessibility features in story
        - CRITICAL: If a new *.stories.tsx is added or modified, verify that a corresponding *.test.tsx exists in __tests__/ for the same component. Flag as blocking if test file is missing. Rule: "Story sem teste = componente nao entregue" (kanban #19).

    - path: ".github/workflows/**"
      instructions: |
        GitHub Actions:
        - Descriptive job names
        - Cache node_modules (actions/cache)
        - Fail fast on lint/typecheck before tests
        - No secrets in workflow files (use GitHub Secrets)

chat:
  auto_reply: true
